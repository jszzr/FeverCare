name: FeverCare
options:
  bundleIdPrefix: com.zhirui
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "5.9"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    DEVELOPMENT_TEAM: SQ9XVGGG9D
    CODE_SIGN_STYLE: Manual
    ENABLE_USER_SCRIPT_SANDBOXING: NO
targets:
  FeverCare:
    type: application
    platform: iOS
    info:
      path: App/Info.plist
      properties:
        UIBackgroundModes:
          - remote-notification
    sources:
      - App
      - Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.zhirui.shaotuitui
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_ENTITLEMENTS: FeverCare.entitlements
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: 烧退退
        INFOPLIST_KEY_ITSAppUsesNonExemptEncryption: NO
        INFOPLIST_KEY_NSSupportsLiveActivities: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: UIInterfaceOrientationPortrait
        TARGETED_DEVICE_FAMILY: "1"
        CURRENT_PROJECT_VERSION: 2
        MARKETING_VERSION: 0.1.0
      configs:
        Debug:
          APS_ENVIRONMENT: development
          ICLOUD_CONTAINER_ENVIRONMENT: Development
          CODE_SIGN_IDENTITY: Apple Development
          PROVISIONING_PROFILE_SPECIFIER: ShaotuituiDevelopmentProfile
        Release:
          APS_ENVIRONMENT: production
          ICLOUD_CONTAINER_ENVIRONMENT: Production
          CODE_SIGN_IDENTITY: Apple Distribution
          PROVISIONING_PROFILE_SPECIFIER: ShaotuituiDistributionProfile
    dependencies:
      - target: FeverCareWidgets
        embed: true
  FeverCareWidgets:
    type: app-extension
    platform: iOS
    sources:
      - Widgets
      - Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.zhirui.shaotuitui.widget
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: Widgets/Info.plist
        CURRENT_PROJECT_VERSION: 2
        MARKETING_VERSION: 0.1.0
      configs:
        Debug:
          CODE_SIGN_IDENTITY: Apple Development
          PROVISIONING_PROFILE_SPECIFIER: ShaotuituiWidgetDevelopmentProfile
        Release:
          CODE_SIGN_IDENTITY: Apple Distribution
          PROVISIONING_PROFILE_SPECIFIER: ShaotuituiWidgetDistributionProfile
schemes:
  FeverCare:
    build:
      targets:
        FeverCare: all
    run:
      config: Debug
