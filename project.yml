name: FeverCare
options:
  bundleIdPrefix: com.zhirui
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "5.9"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    CODE_SIGN_STYLE: Automatic
    ENABLE_USER_SCRIPT_SANDBOXING: NO
targets:
  FeverCare:
    type: application
    platform: iOS
    sources:
      - App
      - Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.zhirui.fevercare
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: 退烧记录
        INFOPLIST_KEY_NSSupportsLiveActivities: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: UIInterfaceOrientationPortrait
        TARGETED_DEVICE_FAMILY: "1"
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: 0.1.0
    dependencies:
      - target: FeverCareWidgets
        embed: true
  FeverCareWidgets:
    type: app-extension
    platform: iOS
    sources:
      - Widgets
      - Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.zhirui.fevercare.widgets
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: Widgets/Info.plist
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: 0.1.0
schemes:
  FeverCare:
    build:
      targets:
        FeverCare: all
    run:
      config: Debug
